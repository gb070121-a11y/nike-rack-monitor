<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RACK MONITOR — 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--border:#2a2a2a;--accent:#ff4d00;--accent2:#ff8c42;--green:#39d353;--red:#f85149;--yellow:#e3b341;--blue:#58a6ff;--text:#e8e8e8;--muted:#666;--font-display:'Bebas Neue',sans-serif;--font-body:'Noto Sans KR',sans-serif;--font-mono:'JetBrains Mono',monospace;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;padding-bottom:80px;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .logo{font-family:var(--font-display);font-size:24px;letter-spacing:4px;}.logo span{color:var(--accent);}
  .container{max-width:1100px;margin:0 auto;padding:20px 16px;}

  /* TOP BAR */
  .top-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
  .store-tabs{display:flex;gap:6px;}
  .store-tab{padding:8px 20px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font-body);font-size:14px;cursor:pointer;transition:all 0.2s;}
  .store-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
  .btn-action{background:transparent;border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:4px;font-family:var(--font-body);font-size:13px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .btn-action:hover{border-color:var(--accent);color:var(--accent);}
  .btn-action.green:hover{border-color:var(--green);color:var(--green);}
  .last-updated{font-size:11px;color:var(--muted);font-family:var(--font-mono);margin-left:auto;}

  /* KPI */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
  @media(max-width:700px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
  .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden;}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .kpi-card.total::before{background:var(--accent);}
  .kpi-card.racks::before{background:var(--blue);}
  .kpi-card.discounted::before{background:var(--yellow);}
  .kpi-card.changes::before{background:var(--green);}
  .kpi-value{font-family:var(--font-display);font-size:36px;line-height:1;margin-bottom:4px;}
  .kpi-card.total .kpi-value{color:var(--accent);}
  .kpi-card.racks .kpi-value{color:var(--blue);}
  .kpi-card.discounted .kpi-value{color:var(--yellow);}
  .kpi-card.changes .kpi-value{color:var(--green);}
  .kpi-label{font-size:12px;color:var(--muted);}

  /* 변동 이력 */
  .section-title{font-family:var(--font-display);font-size:20px;letter-spacing:3px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .change-list{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:24px;}
  .change-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);transition:background 0.15s;flex-wrap:wrap;}
  .change-row:last-child{border-bottom:none;}
  .change-row:hover{background:rgba(255,255,255,0.02);}
  .badge{font-size:10px;font-family:var(--font-mono);font-weight:700;padding:3px 8px;border-radius:3px;white-space:nowrap;}
  .badge-added{background:rgba(57,211,83,0.15);color:var(--green);}
  .badge-removed{background:rgba(248,81,73,0.15);color:var(--red);}
  .badge-changed{background:rgba(227,179,65,0.15);color:var(--yellow);}
  .badge-rack{background:rgba(255,77,0,0.15);color:var(--accent);font-family:var(--font-mono);font-size:11px;padding:3px 8px;border-radius:3px;}
  .change-time{font-size:11px;color:var(--muted);font-family:var(--font-mono);white-space:nowrap;}
  .change-detail{font-size:12px;color:var(--muted);}
  .no-data{padding:32px;text-align:center;color:var(--muted);font-size:13px;}

  /* 검색 */
  .search-wrap{position:relative;margin-bottom:16px;}
  .search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:11px 16px 11px 40px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:border-color 0.2s;}
  .search-input:focus{border-color:var(--accent);}
  .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);}
  .sku-result{display:none;background:var(--surface);border:2px solid var(--accent);border-radius:8px;padding:14px;margin-bottom:14px;}
  .sku-result.show{display:block;}
  .sku-result-item{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);}
  .sku-result-item:last-child{border-bottom:none;}

  /* 랙 그리드 */
  .rack-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
  @media(max-width:500px){.rack-grid{grid-template-columns:1fr;}}
  .rack-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color 0.2s;}
  .rack-card:hover{border-color:#444;}
  .rack-card-header{padding:11px 14px;background:var(--surface2);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);cursor:pointer;}
  .rack-card-title{font-family:var(--font-display);font-size:17px;letter-spacing:2px;color:var(--accent);}
  .rack-card-meta{font-size:11px;color:var(--muted);font-family:var(--font-mono);margin-top:2px;}
  .rack-card-actions{display:flex;gap:6px;align-items:center;}
  .btn-rack-del{background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 9px;border-radius:4px;font-size:11px;cursor:pointer;transition:all 0.2s;}
  .btn-rack-del:hover{border-color:var(--red);color:var(--red);}
  .rack-toggle{color:var(--muted);font-size:11px;transition:transform 0.2s;padding:4px;}
  .rack-toggle.open{transform:rotate(180deg);}
  .rack-body{display:none;}
  .rack-body.open{display:block;}

  /* 제품 행 */
  .product-row{display:grid;grid-template-columns:20px 1fr auto;gap:8px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);transition:background 0.15s;cursor:pointer;}
  .product-row:last-child{border-bottom:none;}
  .product-row:hover{background:rgba(255,255,255,0.02);}
  .product-row.selected{background:rgba(255,77,0,0.06);}
  .product-check{width:14px;height:14px;cursor:pointer;accent-color:var(--accent);}
  .product-sku{font-family:var(--font-mono);font-size:12px;color:var(--accent2);}
  .product-name{font-size:11px;color:var(--muted);margin-top:1px;}
  .price-sale{font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--red);}
  .price-orig{font-family:var(--font-mono);font-size:10px;color:var(--muted);text-decoration:line-through;}
  .price-normal{font-family:var(--font-mono);font-size:12px;font-weight:700;}
  .disc-badge{display:inline-block;background:rgba(248,81,73,0.18);color:var(--red);font-size:9px;font-family:var(--font-mono);font-weight:700;padding:1px 5px;border-radius:3px;}

  /* 선택 툴바 */
  .sel-toolbar{display:none;background:var(--surface2);border:1px solid var(--accent);border-radius:8px;padding:10px 14px;margin-bottom:12px;align-items:center;gap:10px;flex-wrap:wrap;}
  .sel-toolbar.show{display:flex;}
  .sel-count{font-family:var(--font-mono);font-size:12px;color:var(--accent);}

  /* 이동 모달 */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;align-items:center;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:90%;max-width:340px;}
  .modal-title{font-family:var(--font-display);font-size:20px;letter-spacing:2px;margin-bottom:16px;}
  .modal-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:6px;width:100%;font-family:var(--font-mono);font-size:13px;margin-bottom:16px;}
  .modal-btns{display:flex;gap:8px;}
  .modal-btn{flex:1;padding:12px;border-radius:6px;border:none;font-family:var(--font-display);font-size:16px;letter-spacing:2px;cursor:pointer;}
  .modal-btn.confirm{background:var(--accent);color:#fff;}
  .modal-btn.cancel{background:var(--surface2);color:var(--muted);}

  .loading{text-align:center;padding:60px;color:var(--muted);}
  .spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* 비교분석 */
  .overlap-row{display:grid;grid-template-columns:140px 1fr 1fr;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);align-items:start;font-size:12px;}
  .overlap-row:last-child{border-bottom:none;}
  .overlap-sku{font-family:var(--font-mono);font-weight:700;color:var(--accent2);}
  .overlap-store{font-size:11px;color:var(--muted);}
  .overlap-price{font-family:var(--font-mono);font-size:11px;}
  .tag-both{background:rgba(57,211,83,0.15);color:var(--green);font-size:9px;font-family:var(--font-mono);padding:1px 6px;border-radius:3px;}
  .tag-g{background:rgba(88,166,255,0.15);color:var(--blue);font-size:9px;font-family:var(--font-mono);padding:1px 6px;border-radius:3px;}
  .tag-j{background:rgba(227,179,65,0.15);color:var(--yellow);font-size:9px;font-family:var(--font-mono);padding:1px 6px;border-radius:3px;}
  .kpi-mini{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;}
  .kpi-mini-val{font-family:var(--font-display);font-size:24px;line-height:1;}
  .kpi-mini-lbl{font-size:10px;color:var(--muted);margin-top:2px;}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:500;}
  .bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;text-decoration:none;color:var(--muted);font-size:11px;transition:color 0.2s;gap:3px;}
  .bottom-nav a.active{color:var(--accent);}
  .nav-icon{font-size:20px;}
  #toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 22px;font-size:14px;transition:transform 0.3s;z-index:400;white-space:nowrap;pointer-events:none;}
  #toast.show{transform:translateX(-50%) translateY(0);}
  #toast.success{border-color:var(--green);}
  #toast.error{border-color:var(--red);}
</style>
</head>
<body>
<header>
  <div class="logo">RACK<span>.</span>MONITOR</div>
</header>

<div class="container">
  <div class="top-bar">
    <div class="store-tabs">
      <button class="store-tab active" onclick="selectStore('gimhae',this)">김해</button>
      <button class="store-tab" onclick="selectStore('jeonggwan',this)">정관</button>
    </div>
    <button class="btn-action green" onclick="downloadExcel()">📥 엑셀</button>
    <span class="last-updated" id="last-updated"></span>
  </div>

  <!-- KPI -->
  <div class="kpi-grid">
    <div class="kpi-card total"><div class="kpi-value" id="kpi-total">—</div><div class="kpi-label">전체 제품 수</div></div>
    <div class="kpi-card racks"><div class="kpi-value" id="kpi-racks">—</div><div class="kpi-label">등록된 랙 수</div></div>
    <div class="kpi-card discounted"><div class="kpi-value" id="kpi-disc">—</div><div class="kpi-label">할인 적용</div></div>
    <div class="kpi-card changes"><div class="kpi-value" id="kpi-changes">—</div><div class="kpi-label">최근 변동</div></div>
  </div>

  <!-- 변동 이력 -->
  <div class="section-title">
    최근 변동 이력
    <div style="display:flex;gap:8px;">
      <button class="btn-action" style="font-size:11px;padding:5px 10px" onclick="exportCSV()">⬇ CSV</button>
    </div>
  </div>
  <div class="change-list" id="change-list">
    <div class="no-data">불러오는 중...</div>
  </div>

  <!-- 랙별 현황 -->
  <div class="section-title">
    랙별 현황
    <span style="font-size:12px;color:var(--muted);font-family:var(--font-mono);font-weight:400" id="rack-count-label"></span>
  </div>

  <!-- 통합 검색 + 분석 -->
  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
    <button class="btn-action" onclick="openOverlapModal()" style="flex:none">📊 매장 비교 분석</button>
    <button class="btn-action green" onclick="downloadOverlapExcel()" style="flex:none">📥 비교 엑셀</button>
  </div>

  <div class="sku-result" id="sku-result">
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-family:var(--font-mono)">🔍 검색 결과</div>
    <div id="sku-result-content"></div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="search-input"
      placeholder="품번 검색 (Enter → 김해+정관 동시) / 랙 이름 필터"
      oninput="filterRacks(this.value)"
      onkeydown="if(event.key==='Enter') searchSKUAll(this.value)">
  </div>

  <!-- 선택 툴바 -->
  <div class="sel-toolbar" id="sel-toolbar">
    <span class="sel-count" id="sel-count">0개 선택</span>
    <button class="btn-action" onclick="openMoveModal()">📦 랙 이동</button>
    <button class="btn-action" style="color:var(--blue);border-color:var(--blue)" onclick="openCopyProductsModal()">📋 다른 매장으로 복사</button>
    <button class="btn-action" style="color:var(--red);border-color:var(--border)" onclick="deleteSelected()">🗑️ 선택 삭제</button>
    <button class="btn-action" onclick="clearSelection()">✕ 해제</button>
  </div>

  <div id="rack-grid" class="rack-grid">
    <div class="loading"><div class="spinner"></div>불러오는 중...</div>
  </div>
</div>

<!-- 비교 분석 모달 -->
<div class="modal-overlay" id="overlap-modal" style="z-index:350">
  <div class="modal" style="max-width:700px;width:95%;max-height:85vh;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="modal-title">📊 매장 비교 분석</div>
      <button onclick="closeOverlapModal()" style="background:transparent;border:none;color:var(--muted);font-size:20px;cursor:pointer">✕</button>
    </div>

    <!-- 탭 -->
    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap" id="overlap-tabs">
      <button class="store-tab active" onclick="showOverlapTab('all',this)">전체</button>
      <button class="store-tab" onclick="showOverlapTab('both',this)">양쪽 공통</button>
      <button class="store-tab" onclick="showOverlapTab('gimhae',this)">김해만</button>
      <button class="store-tab" onclick="showOverlapTab('jeonggwan',this)">정관만</button>
    </div>

    <!-- 요약 -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px" id="overlap-summary"></div>

    <!-- 결과 -->
    <div id="overlap-content" style="font-size:12px">
      <div style="text-align:center;padding:32px;color:var(--muted)">불러오는 중...</div>
    </div>
  </div>
</div>

<!-- 품번 복사 모달 -->
<div class="modal-overlay" id="copy-products-modal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-title">📋 품번 복사</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px" id="copy-products-desc"></div>

    <div style="font-size:12px;color:var(--muted);margin-bottom:6px">복사할 매장:</div>
    <select class="modal-select" id="cp-to-store" onchange="updateCpRackList()">
      <option value="gimhae">김해</option>
      <option value="jeonggwan">정관</option>
    </select>

    <div style="font-size:12px;color:var(--muted);margin-bottom:6px">복사할 랙:</div>
    <select class="modal-select" id="cp-to-rack"></select>

    <div style="font-size:11px;color:var(--muted);margin-top:8px;padding:8px;background:var(--surface2);border-radius:6px">
      💡 기존 랙 데이터에 추가됩니다. 이미 있는 품번은 건너뜁니다.
    </div>

    <div class="modal-btns" style="margin-top:14px">
      <button class="modal-btn cancel" onclick="closeCopyProductsModal()">취소</button>
      <button class="modal-btn confirm" onclick="confirmCopyProducts()" style="background:var(--blue)">복사</button>
    </div>
  </div>
</div>

<!-- 랙 이동 모달 -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title">랙 이동</div>
    <select class="modal-select" id="modal-rack-select"></select>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn confirm" onclick="confirmMove()">이동</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="/"><span class="nav-icon">📸</span><span>스캔</span></a>
  <a href="/floorplan"><span class="nav-icon">🗺️</span><span>랙별등록</span></a>
  <a href="/dashboard" class="active"><span class="nav-icon">📊</span><span>대시보드</span></a>
</nav>
<div id="toast"></div>

<script>
let currentStore = 'gimhae';
let overviewData = null;
let changesData = [];
let selectedProducts = new Set(); // "rack_name::sku" 형식

const RACK_NAMES = [
  '왼_벽랙','1_양면A','1_양면B','2_양면A','2_양면B','3_양면A','3_양면B',
  '4_양면A','4_양면B','5_양면A','5_양면B','중간A_랙',
  '6_양면A','6_양면B','7_양면A','7_양면B','8_양면A','8_양면B',
  '9_양면A','9_양면B','10_양면A','10_양면B','중간B_랙',
  '11_양면A','11_양면B','12_양면A','12_양면B','13_양면A','13_양면B',
  '14_양면A','14_양면B','15_양면A','15_양면B','오른_벽랙','뒷_벽랙'
];

function selectStore(store, el) {
  currentStore = store;
  document.querySelectorAll('.store-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  clearSelection();
  loadData();
}

async function loadData() {
  document.getElementById('rack-grid').innerHTML = '<div class="loading"><div class="spinner"></div>불러오는 중...</div>';
  document.getElementById('change-list').innerHTML = '<div class="no-data">불러오는 중...</div>';

  try {
    const [overRes, chgRes] = await Promise.all([
      fetch(`/api/overview/${currentStore}`),
      fetch(`/api/changes/${currentStore}?limit=30`)
    ]);
    overviewData = await overRes.json();
    changesData = await chgRes.json();
    renderAll();
  } catch(e) {
    document.getElementById('rack-grid').innerHTML = '<div class="loading">데이터 로드 실패</div>';
  }
}

function renderAll() {
  if (!overviewData) return;
  renderKPI();
  renderChanges();
  renderRacks(overviewData.racks);
  document.getElementById('last-updated').textContent = '마지막 업데이트: ' + new Date().toLocaleTimeString('ko-KR');
}

function renderKPI() {
  const o = overviewData;
  document.getElementById('kpi-total').textContent = o.total_products;
  document.getElementById('kpi-racks').textContent = o.rack_count;
  document.getElementById('kpi-disc').textContent = o.discounted_count;
  const totalChanges = changesData.reduce((a,c) => {
    const s = c.changes?.summary || {};
    return a + (s.added||0) + (s.removed||0) + (s.changed||0);
  }, 0);
  document.getElementById('kpi-changes').textContent = totalChanges;
  document.getElementById('rack-count-label').textContent = `${o.rack_count}개 랙 · ${o.total_products}개 제품`;
}

function renderChanges() {
  const list = document.getElementById('change-list');
  if (!changesData.length) {
    list.innerHTML = '<div class="no-data">변동 이력 없음</div>';
    return;
  }
  list.innerHTML = changesData.map(h => {
    const ch = h.changes || {};
    const s = ch.summary || {};
    const pills = [
      s.added ? `<span class="badge badge-added">+${s.added} 신규</span>` : '',
      s.removed ? `<span class="badge badge-removed">-${s.removed} 제거</span>` : '',
      s.changed ? `<span class="badge badge-changed">~${s.changed} 변동</span>` : '',
    ].filter(Boolean).join(' ');
    return `<div class="change-row">
      <span class="badge badge-rack">${h.rack_name}</span>
      ${pills}
      <span class="change-detail">${h.product_count}개 제품</span>
      <span class="change-time">${h.scanned_at}</span>
    </div>`;
  }).join('');
}

function renderRacks(racks, filterText='') {
  const grid = document.getElementById('rack-grid');
  let filtered = racks;
  if (filterText) {
    const q = filterText.toLowerCase();
    filtered = racks.filter(r =>
      r.rack_name.toLowerCase().includes(q) ||
      r.products.some(p => (p.sku||'').toLowerCase().includes(q))
    );
  }
  if (!filtered.length) {
    grid.innerHTML = '<div class="loading">검색 결과 없음</div>';
    return;
  }
  grid.innerHTML = filtered.map(rack => {
    const discCount = rack.products.filter(p => p.sale_price || p.discount_rate).length;
    const rows = rack.products.map(p => {
      const key = `${rack.rack_name}::${p.sku}`;
      const isSel = selectedProducts.has(key);
      return `<div class="product-row ${isSel?'selected':''}" onclick="toggleSel('${key}',this)">
        <input type="checkbox" class="product-check" ${isSel?'checked':''} onclick="event.stopPropagation();toggleSel('${key}',this.closest('.product-row'))">
        <div>
          <div class="product-sku">${p.sku||'-'}</div>
          ${p.name?`<div class="product-name">${p.name}</div>`:''}
        </div>
        <div style="text-align:right">
          ${p.sale_price
            ?`<div class="price-sale">${fmt(p.sale_price)}<span class="disc-badge">-${p.discount_rate||''}%</span></div><div class="price-orig">${fmt(p.price)}</div>`
            :`<div class="price-normal">${fmt(p.price)}</div>`}
        </div>
      </div>`;
    }).join('');
    return `<div class="rack-card">
      <div class="rack-card-header" onclick="toggleRack(this)">
        <div>
          <div class="rack-card-title">${rack.rack_name}</div>
          <div class="rack-card-meta">${rack.products.length}개${discCount?` · 할인 ${discCount}개`:''} · ${rack.last_scanned_at.slice(0,10)}</div>
        </div>
        <div class="rack-card-actions" onclick="event.stopPropagation()">
          <button class="btn-rack-del" onclick="deleteRack('${rack.rack_name}')">🗑️ 삭제</button>
          <span class="rack-toggle open">▲</span>
        </div>
      </div>
      <div class="rack-body open">${rows||'<div style="padding:14px;color:var(--muted);font-size:13px;text-align:center">제품 없음</div>'}</div>
    </div>`;
  }).join('');
}

function toggleRack(header) {
  const body = header.nextElementSibling;
  const toggle = header.querySelector('.rack-toggle');
  body.classList.toggle('open');
  toggle.classList.toggle('open');
}

// ── 선택 ──
function toggleSel(key, row) {
  if (selectedProducts.has(key)) { selectedProducts.delete(key); row.classList.remove('selected'); }
  else { selectedProducts.add(key); row.classList.add('selected'); }
  updateSelToolbar();
}
function clearSelection() {
  selectedProducts.clear();
  document.querySelectorAll('.product-row.selected').forEach(r => r.classList.remove('selected'));
  document.querySelectorAll('.product-check').forEach(c => c.checked = false);
  document.getElementById('sel-toolbar').classList.remove('show');
}
function updateSelToolbar() {
  const n = selectedProducts.size;
  if (n > 0) {
    document.getElementById('sel-toolbar').classList.add('show');
    document.getElementById('sel-count').textContent = `${n}개 선택`;
  } else {
    document.getElementById('sel-toolbar').classList.remove('show');
  }
}

// ── 랙 삭제 ──
async function deleteRack(rackName) {
  if (!confirm(`${rackName} 데이터를 삭제할까요?`)) return;
  try {
    await fetch(`/api/rack/${currentStore}/${encodeURIComponent(rackName)}`, { method:'DELETE' });
    showToast(`✅ ${rackName} 삭제 완료`, 'success');
    loadData();
  } catch { showToast('삭제 실패', 'error'); }
}

// ── SKU 검색 ──
async function searchSKU(q) {
  if (!q.trim()) return;
  const res = await fetch(`/api/search/${currentStore}?sku=${encodeURIComponent(q)}`);
  const data = await res.json();
  const box = document.getElementById('sku-result');
  const content = document.getElementById('sku-result-content');
  box.classList.add('show');
  if (!data.length) { content.innerHTML = `<div style="color:var(--muted);font-size:13px">❌ "${q}" 없음</div>`; return; }
  content.innerHTML = data.map(r => `
    <div class="sku-result-item">
      <span style="background:var(--accent);color:#fff;font-family:var(--font-display);font-size:14px;letter-spacing:2px;padding:3px 10px;border-radius:4px">${r.rack_name}</span>
      <div>
        <div style="font-family:var(--font-mono);font-size:13px;color:var(--accent2)">${r.product.sku||'-'}</div>
        ${r.product.name?`<div style="font-size:11px;color:var(--muted)">${r.product.name}</div>`:''}
      </div>
      <div style="text-align:right;font-family:var(--font-mono);font-size:12px;margin-left:auto">
        ${r.product.sale_price?`<div style="color:var(--red);font-weight:700">${fmt(r.product.sale_price)}</div>`:``}
        <div>${fmt(r.product.price)}</div>
      </div>
    </div>`).join('');
}

function filterRacks(q) {
  if (!overviewData) return;
  if (!q) document.getElementById('sku-result').classList.remove('show');
  renderRacks(overviewData.racks, q);
}

// ── 랙 이동 모달 ──
function openMoveModal() {
  if (!selectedProducts.size) return;
  const sel = document.getElementById('modal-rack-select');
  sel.innerHTML = RACK_NAMES.map(n => `<option value="${n}">${n}</option>`).join('');
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }
async function confirmMove() {
  const targetRack = document.getElementById('modal-rack-select').value;
  // 이동: 각 선택된 제품을 target rack에 추가 (현재는 UI만, 실제는 재스캔 필요)
  showToast(`📦 ${selectedProducts.size}개 → ${targetRack} 이동 (재스캔으로 반영됩니다)`, 'success');
  closeModal();
  clearSelection();
}

// ── 엑셀/CSV ──
function downloadExcel() {
  window.location.href = `/api/excel/${currentStore}`;
}
function exportCSV() {
  if (!changesData.length) { showToast('변동 데이터 없음'); return; }
  const rows = [['스캔일시','랙이름','신규','삭제','변동','제품수']];
  changesData.forEach(h => {
    const s = h.changes?.summary || {};
    rows.push([h.scanned_at, h.rack_name, s.added||0, s.removed||0, s.changed||0, h.product_count]);
  });
  const csv = rows.map(r=>r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv'}));
  a.download = `변동이력_${currentStore}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── 선택 삭제 (현재 구조상 랙 단위 삭제로 대체) ──
async function deleteSelected() {
  if (!selectedProducts.size) return;
  showToast('개별 제품 삭제는 랙 재스캔으로 반영됩니다', 'error');
}

// 전체 랙 목록
const ALL_RACK_NAMES = [
  '왼_벽랙','뒷_벽랙','오른_벽랙',
  '1_양면A','1_양면B','2_양면A','2_양면B','3_양면A','3_양면B',
  '4_양면A','4_양면B','5_양면A','5_양면B','중간A_랙',
  '6_양면A','6_양면B','7_양면A','7_양면B','8_양면A','8_양면B',
  '9_양면A','9_양면B','10_양면A','10_양면B','중간B_랙',
  '11_양면A','11_양면B','12_양면A','12_양면B','13_양면A','13_양면B',
  '14_양면A','14_양면B','15_양면A','15_양면B'
];

function updateCpRackList() {
  const sel = document.getElementById('cp-to-rack');
  sel.innerHTML = ALL_RACK_NAMES.map(n => `<option value="${n}">${n}</option>`).join('');
}

function openCopyProductsModal() {
  if (!selectedProducts.size) return;
  const skus = [...selectedProducts].map(k => k.split('::')[1]).filter(Boolean);
  document.getElementById('copy-products-desc').textContent =
    `선택된 품번 ${skus.length}개를 다른 매장/랙에 추가합니다`;

  // 현재 매장의 반대 매장을 기본값으로
  const cpStore = document.getElementById('cp-to-store');
  cpStore.value = currentStore === 'gimhae' ? 'jeonggwan' : 'gimhae';
  updateCpRackList();
  document.getElementById('copy-products-modal').classList.add('show');
}

function closeCopyProductsModal() {
  document.getElementById('copy-products-modal').classList.remove('show');
}

async function confirmCopyProducts() {
  const toStore = document.getElementById('cp-to-store').value;
  const toRack = document.getElementById('cp-to-rack').value;

  // SKU 추출 (rack_name::sku 형식)
  const skus = [...selectedProducts].map(k => k.split('::')[1]).filter(Boolean);
  if (!skus.length) return;

  try {
    const form = new FormData();
    skus.forEach(s => form.append('skus', s));
    form.append('from_store', currentStore);
    form.append('to_store', toStore);
    form.append('to_rack', toRack);

    const res = await fetch('/api/copy/products', { method:'POST', body:form });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || '복사 실패');
    }
    const data = await res.json();

    closeCopyProductsModal();
    clearSelection();

    const storeLabel = toStore === 'gimhae' ? '김해' : '정관';
    showToast(
      `✅ ${storeLabel} / ${toRack} 에 ${data.copied_count}개 복사 완료` +
      (data.skipped_count ? ` (중복 ${data.skipped_count}개 건너뜀)` : ''),
      'success'
    );
  } catch(e) {
    showToast('❌ ' + e.message, 'error');
  }
}

function fmt(n) { if (!n && n!==0) return '-'; return Number(n).toLocaleString('ko-KR')+'원'; }
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = type; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── 통합 SKU 검색 (김해+정관) ──
async function searchSKUAll(q) {
  if (!q.trim()) return;
  const res = await fetch(`/api/search/all?sku=${encodeURIComponent(q)}`);
  const data = await res.json();
  const box = document.getElementById('sku-result');
  const content = document.getElementById('sku-result-content');
  box.classList.add('show');

  if (!data.total) {
    content.innerHTML = `<div style="color:var(--muted);font-size:13px">❌ "${q}" — 김해/정관 모두 없음</div>`;
    return;
  }

  let html = '';
  const renderItems = (items, storeLabel, color) =>
    items.map(r => `
      <div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)">
        <span style="background:${color};color:#fff;font-size:10px;padding:2px 7px;border-radius:3px;white-space:nowrap">${storeLabel}</span>
        <span style="background:rgba(255,77,0,0.15);color:var(--accent);font-size:11px;padding:2px 7px;border-radius:3px">${r.rack_name}</span>
        <div style="flex:1">
          <div style="font-family:var(--font-mono);font-size:12px;color:var(--accent2)">${r.product.sku||'-'}</div>
          ${r.product.name?`<div style="font-size:10px;color:var(--muted)">${r.product.name}</div>`:''}
        </div>
        <div style="text-align:right;font-family:var(--font-mono);font-size:11px">
          ${r.product.sale_price?`<div style="color:var(--red);font-weight:700">${fmt(r.product.sale_price)}</div><div style="color:var(--muted);text-decoration:line-through">${fmt(r.product.price)}</div>`:`<div>${fmt(r.product.price)}</div>`}
        </div>
      </div>`).join('');

  if (data.gimhae.length) html += renderItems(data.gimhae, '김해', '#ff4d00');
  if (data.jeonggwan.length) html += renderItems(data.jeonggwan, '정관', '#e3b341');
  content.innerHTML = html || '<div style="color:var(--muted)">결과 없음</div>';
}

// ── 비교 분석 모달 ──
let overlapData = null;
let overlapTab = 'all';

async function openOverlapModal() {
  document.getElementById('overlap-modal').classList.add('show');
  if (!overlapData) await loadOverlapData();
  else renderOverlap();
}

function closeOverlapModal() {
  document.getElementById('overlap-modal').classList.remove('show');
}

async function loadOverlapData() {
  document.getElementById('overlap-content').innerHTML = '<div style="text-align:center;padding:32px;color:var(--muted)">분석 중...</div>';
  try {
    const res = await fetch('/api/analysis/overlap');
    overlapData = await res.json();
    renderOverlap();
  } catch { document.getElementById('overlap-content').innerHTML = '<div style="color:var(--red)">로드 실패</div>'; }
}

function showOverlapTab(tab, el) {
  overlapTab = tab;
  document.querySelectorAll('#overlap-tabs .store-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderOverlap();
}

function renderOverlap() {
  if (!overlapData) return;
  const s = overlapData.summary;

  // 요약 카드
  document.getElementById('overlap-summary').innerHTML = `
    <div class="kpi-mini"><div class="kpi-mini-val" style="color:var(--accent)">${s.total_unique}</div><div class="kpi-mini-lbl">전체 품번</div></div>
    <div class="kpi-mini"><div class="kpi-mini-val" style="color:var(--green)">${s.both}</div><div class="kpi-mini-lbl">양쪽 공통</div></div>
    <div class="kpi-mini"><div class="kpi-mini-val" style="color:var(--blue)">${s.gimhae_only}</div><div class="kpi-mini-lbl">김해만</div></div>
    <div class="kpi-mini"><div class="kpi-mini-val" style="color:var(--yellow)">${s.jeonggwan_only}</div><div class="kpi-mini-lbl">정관만</div></div>`;

  let items = [];
  if (overlapTab === 'all') items = [...overlapData.both, ...overlapData.gimhae_only, ...overlapData.jeonggwan_only];
  else if (overlapTab === 'both') items = overlapData.both;
  else if (overlapTab === 'gimhae') items = overlapData.gimhae_only;
  else items = overlapData.jeonggwan_only;

  if (!items.length) {
    document.getElementById('overlap-content').innerHTML = '<div style="text-align:center;padding:24px;color:var(--muted)">데이터 없음</div>';
    return;
  }

  const html = items.map(item => {
    const inG = item.gimhae?.length > 0;
    const inJ = item.jeonggwan?.length > 0;
    const tag = (inG && inJ) ? '<span class="tag-both">양쪽</span>' : inG ? '<span class="tag-g">김해</span>' : '<span class="tag-j">정관</span>';
    const g = item.gimhae?.[0];
    const j = item.jeonggwan?.[0];
    const priceDiff = item.price_diff;
    return `<div class="overlap-row">
      <div>
        <div class="overlap-sku">${item.sku}</div>
        <div style="margin-top:3px">${tag}</div>
        ${priceDiff !== undefined ? `<div style="font-size:10px;font-family:var(--font-mono);margin-top:2px;color:${priceDiff>0?'var(--red)':priceDiff<0?'var(--green)':'var(--muted)'}">${priceDiff>0?'+':''}${priceDiff}원</div>` : ''}
      </div>
      <div>
        ${g ? `<div class="overlap-store">김해 · ${g.rack_name}</div>
          <div class="overlap-price">${g.sale_price?`<span style="color:var(--red)">${fmt(g.sale_price)}</span> <span style="text-decoration:line-through;color:var(--muted)">${fmt(g.price)}</span>`:fmt(g.price)}</div>` : '<div style="color:var(--muted);font-size:11px">—</div>'}
      </div>
      <div>
        ${j ? `<div class="overlap-store">정관 · ${j.rack_name}</div>
          <div class="overlap-price">${j.sale_price?`<span style="color:var(--red)">${fmt(j.sale_price)}</span> <span style="text-decoration:line-through;color:var(--muted)">${fmt(j.price)}</span>`:fmt(j.price)}</div>` : '<div style="color:var(--muted);font-size:11px">—</div>'}
      </div>
    </div>`;
  }).join('');

  document.getElementById('overlap-content').innerHTML = html;
}

function downloadOverlapExcel() {
  window.location.href = '/api/analysis/overlap/excel';
}

// 초기 로드
selectStore('gimhae', document.querySelector('.store-tab.active'));
</script>
