<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RACK MONITOR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e; --border: #2a2a2a;
    --accent: #ff4d00; --accent2: #ff8c42; --green: #39d353; --red: #f85149;
    --yellow: #e3b341; --text: #e8e8e8; --muted: #666;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'Noto Sans KR', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; padding-bottom: 80px; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: var(--font-display); font-size: 24px; letter-spacing: 4px; }
  .logo span { color: var(--accent); }
  .store-tabs { display: flex; gap: 6px; }
  .store-tab { padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--font-body); font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .store-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }

  .container { max-width: 700px; margin: 0 auto; padding: 24px 16px; }

  /* MODE SELECTOR */
  .mode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .mode-card { background: var(--surface); border: 2px solid var(--border); border-radius: 10px; padding: 14px 10px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .mode-card:hover { border-color: #444; }
  .mode-card.active { border-color: var(--accent); background: rgba(255,77,0,0.06); }
  .mode-icon { font-size: 26px; margin-bottom: 6px; }
  .mode-title { font-family: var(--font-display); font-size: 14px; letter-spacing: 2px; margin-bottom: 3px; }
  .mode-card.active .mode-title { color: var(--accent); }
  .mode-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }

  /* MODE INFO BAR */
  .mode-info { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 16px; font-size: 13px; color: var(--muted); line-height: 1.6; }
  .mode-info strong { color: var(--text); }

  /* 이어서 세션 상태 */
  .session-bar { background: var(--surface); border: 1px solid var(--green); border-radius: 8px; padding: 12px 14px; margin-bottom: 16px; display: none; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .session-bar.show { display: flex; }
  .session-badge { background: var(--green); color: #000; font-family: var(--font-mono); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 3px; }
  .session-stats { font-family: var(--font-mono); font-size: 12px; color: var(--muted); margin-top: 2px; }
  .btn-finish { background: transparent; border: 1px solid var(--green); color: var(--green); padding: 8px 14px; border-radius: 6px; font-family: var(--font-body); font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .btn-finish:hover { background: var(--green); color: #000; }

  /* 랙 번호 입력 */
  .rack-input-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 16px; display: none; align-items: center; gap: 12px; }
  .rack-input-bar.show { display: flex; }
  .rack-input-label { font-size: 13px; color: var(--muted); white-space: nowrap; }
  .rack-number-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-family: var(--font-mono); font-size: 18px; font-weight: 700; width: 80px; outline: none; text-align: center; }
  .rack-number-input:focus { border-color: var(--accent); }

  /* UPLOAD ZONE */
  .upload-zone { background: var(--surface); border: 2px dashed var(--border); border-radius: 12px; padding: 28px 20px; text-align: center; cursor: pointer; position: relative; transition: all 0.3s; }
  .upload-zone.drag-over { border-color: var(--accent); background: rgba(255,77,0,0.05); }
  .upload-zone.has-files { border-style: solid; border-color: var(--accent); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 40px; margin-bottom: 10px; display: block; }
  .upload-title { font-family: var(--font-display); font-size: 20px; letter-spacing: 3px; margin-bottom: 6px; }
  .upload-sub { color: var(--muted); font-size: 13px; line-height: 1.6; }

  /* PREVIEW */
  .preview-section { display: none; margin-top: 14px; }
  .preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .preview-title { font-family: var(--font-display); font-size: 15px; letter-spacing: 2px; }
  .preview-count { background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(68px, 1fr)); gap: 6px; max-height: 160px; overflow-y: auto; }
  .preview-thumb { aspect-ratio: 1; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
  .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .preview-thumb.black-frame { background: #000; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 9px; font-family: var(--font-mono); }

  /* 분석 버튼 — 항상 같은 모양 */
  .btn-analyze { width: 100%; margin-top: 16px; padding: 18px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-family: var(--font-display); font-size: 22px; letter-spacing: 4px; cursor: pointer; transition: all 0.2s; display: none; align-items: center; justify-content: center; gap: 8px; }
  .btn-analyze:hover:not(:disabled) { background: #ff6520; transform: translateY(-1px); }
  .btn-analyze:disabled { background: var(--muted); cursor: not-allowed; transform: none; }
  .btn-analyze.show { display: flex; }

  /* PROGRESS */
  .progress-section { display: none; margin-top: 16px; }
  .progress-bar-wrap { background: var(--surface2); border-radius: 4px; height: 6px; overflow: hidden; margin: 10px 0; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); width: 0%; transition: width 0.4s ease; border-radius: 4px; }
  .progress-text { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }

  /* RESULT */
  .result-box { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-top: 16px; }
  .result-box.show { display: block; }
  .result-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .result-row:last-child { border-bottom: none; }
  .result-label { color: var(--muted); }
  .result-val { font-family: var(--font-mono); font-weight: 700; }
  .diff-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .diff-pill { font-size: 11px; font-family: var(--font-mono); font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .pill-g { background: rgba(57,211,83,0.15); color: var(--green); }
  .pill-r { background: rgba(248,81,73,0.15); color: var(--red); }
  .pill-y { background: rgba(227,179,65,0.15); color: var(--yellow); }

  /* BOTTOM NAV */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 200; padding-bottom: env(safe-area-inset-bottom); }
  .bottom-nav a { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; text-decoration: none; color: var(--muted); font-size: 11px; transition: color 0.2s; gap: 3px; }
  .bottom-nav a.active { color: var(--accent); }
  .nav-icon { font-size: 20px; }

  #toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 22px; font-size: 14px; transition: transform 0.3s; z-index: 999; white-space: nowrap; }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.error { border-color: var(--red); }
  #toast.success { border-color: var(--green); }
</style>
</head>
<body>

<header>
  <div class="logo">RACK<span>.</span>MONITOR</div>
  <div class="store-tabs">
    <button class="store-tab active" onclick="selectStore('gimhae', this)">김해</button>
    <button class="store-tab" onclick="selectStore('jeonggwan', this)">정관</button>
  </div>
</header>

<div class="container">

  <!-- 모드 선택 -->
  <div class="mode-grid">
    <div class="mode-card active" onclick="selectMode('all', this)">
      <div class="mode-icon">📦</div>
      <div class="mode-title">한번에</div>
      <div class="mode-desc">전체 사진<br>한 번에 업로드</div>
    </div>
    <div class="mode-card" onclick="selectMode('append', this)">
      <div class="mode-icon">➕</div>
      <div class="mode-title">이어서</div>
      <div class="mode-desc">나눠서<br>같은 세션에 추가</div>
    </div>
    <div class="mode-card" onclick="selectMode('rack', this)">
      <div class="mode-icon">🔢</div>
      <div class="mode-title">랙별</div>
      <div class="mode-desc">특정 랙만<br>선택해서 교체</div>
    </div>
  </div>

  <!-- 모드 안내 -->
  <div class="mode-info" id="mode-info">
    전체 사진을 한 번에 업로드합니다. 검은 암전 사진이 랙 구분자입니다.
  </div>

  <!-- 이어서 모드: 세션 상태 -->
  <div class="session-bar" id="session-bar">
    <div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:var(--muted)">진행중 세션</span>
        <span class="session-badge" id="session-badge">#0</span>
      </div>
      <div class="session-stats" id="session-stats">랙 0개 · 제품 0개</div>
    </div>
    <button class="btn-finish" onclick="finishSession()">✅ 스캔 완료</button>
  </div>

  <!-- 랙별 모드: 랙 번호 입력 -->
  <div class="rack-input-bar" id="rack-input-bar">
    <span class="rack-input-label">교체할 랙 번호:</span>
    <input type="number" class="rack-number-input" id="rack-number-input" value="1" min="1" max="99">
    <span style="font-size:13px;color:var(--muted)">번 랙</span>
  </div>

  <!-- 업로드 존 -->
  <div class="upload-zone" id="upload-zone">
    <input type="file" id="file-input" multiple accept="image/*" onchange="handleFiles(this.files)">
    <span class="upload-icon">📸</span>
    <div class="upload-title">사진 업로드</div>
    <div class="upload-sub">사진을 선택하거나 드래그하세요<br><span style="color:var(--accent)">검은 암전 사진</span>이 랙 구분자</div>
  </div>

  <!-- 미리보기 -->
  <div class="preview-section" id="preview-section">
    <div class="preview-header">
      <div class="preview-title">PREVIEW</div>
      <span class="preview-count" id="preview-count">0장</span>
    </div>
    <div class="preview-grid" id="preview-grid"></div>
  </div>

  <!-- 분석 버튼 — 모든 모드 동일 -->
  <button class="btn-analyze" id="btn-analyze" onclick="submitScan()">
    🔍 AI 분석 시작
  </button>

  <!-- 진행 -->
  <div class="progress-section" id="progress-section">
    <div class="progress-text" id="progress-text">분석 중...</div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  </div>

  <!-- 결과 -->
  <div class="result-box" id="result-box"></div>

</div>

<nav class="bottom-nav">
  <a href="/" class="active"><span class="nav-icon">📸</span><span>스캔</span></a>
  <a href="/dashboard"><span class="nav-icon">📊</span><span>대시보드</span></a>
</nav>

<div id="toast"></div>

<script>
let selectedStore = 'gimhae';
let selectedMode = 'all';
let selectedFiles = [];
let currentSessionId = null;

const STORE_LABELS = { gimhae: '김해', jeonggwan: '정관' };
const MODE_INFO = {
  all: '전체 사진을 한 번에 업로드합니다. 검은 암전 사진이 랙 구분자입니다.',
  append: '나눠서 올려도 같은 세션에 이어서 누적됩니다.<br><strong>처음 올릴 때 자동으로 세션이 시작</strong>되고, 다 올리면 <strong>스캔 완료</strong>를 누르세요.',
  rack: '교체할 랙 번호를 입력하고 해당 랙 사진만 올리세요.<br><strong>이어서 모드에서 세션을 먼저 시작</strong>한 후 사용하세요.'
};

function selectStore(store, el) {
  selectedStore = store;
  document.querySelectorAll('.store-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

function selectMode(mode, el) {
  selectedMode = mode;
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('mode-info').innerHTML = MODE_INFO[mode];
  document.getElementById('rack-input-bar').className = 'rack-input-bar' + (mode === 'rack' ? ' show' : '');
  updateSessionBar();
  resetFiles();
}

function updateSessionBar() {
  const bar = document.getElementById('session-bar');
  if (selectedMode === 'append' && currentSessionId) {
    bar.classList.add('show');
  } else if (selectedMode === 'rack' && currentSessionId) {
    bar.classList.add('show');
  } else {
    bar.classList.remove('show');
  }
}

// ── 파일 선택 ──
function handleFiles(files) {
  selectedFiles = Array.from(files);
  if (!selectedFiles.length) return;

  document.getElementById('preview-section').style.display = 'block';
  document.getElementById('preview-count').textContent = selectedFiles.length + '장';
  document.getElementById('upload-zone').classList.add('has-files');

  const grid = document.getElementById('preview-grid');
  grid.innerHTML = '';
  selectedFiles.forEach(file => {
    const div = document.createElement('div');
    div.className = 'preview-thumb';
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.src = e.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 16; canvas.height = 16;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, 16, 16);
        const data = ctx.getImageData(0, 0, 16, 16).data;
        let b = 0;
        for (let i = 0; i < data.length; i += 4) b += (data[i]+data[i+1]+data[i+2])/3;
        if (b/(data.length/4) < 30) {
          div.classList.add('black-frame');
          div.textContent = '■ 구분';
        } else {
          const imgEl = document.createElement('img');
          imgEl.src = e.target.result;
          div.appendChild(imgEl);
        }
      };
    };
    reader.readAsDataURL(file);
    grid.appendChild(div);
  });

  // 분석 버튼 표시
  document.getElementById('btn-analyze').classList.add('show');
}

// 드래그앤드롭
const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });

// ── 통합 분석 버튼 ──
async function submitScan() {
  if (!selectedFiles.length) return;

  if (selectedMode === 'all') {
    await submitAll();
  } else if (selectedMode === 'append') {
    // 세션 없으면 자동 시작
    if (!currentSessionId) await startSession();
    await submitAppend();
  } else if (selectedMode === 'rack') {
    if (!currentSessionId) {
      showToast('💡 이어서 모드에서 먼저 사진을 올려 세션을 시작하세요', '');
      return;
    }
    await submitRack();
  }
}

// ── 모드 1: 한번에 ──
async function submitAll() {
  startProgress(selectedFiles.length);
  setLoading(true);
  try {
    const form = new FormData();
    form.append('store', selectedStore);
    selectedFiles.forEach(f => form.append('files', f));
    const res = await fetch('/api/scan', { method: 'POST', body: form });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    stopProgress();
    showResult({ racks: data.racks.length, products: data.racks.reduce((a,r)=>a+r.products.length,0), diff: data.diff, label: '한번에 스캔 완료' });
    resetFiles();
  } catch(e) { stopProgress(); showToast('❌ ' + e.message, 'error'); }
  setLoading(false);
}

// ── 모드 2: 세션 자동 시작 ──
async function startSession() {
  const form = new FormData();
  form.append('store', selectedStore);
  const res = await fetch('/api/scan/start', { method: 'POST', body: form });
  const data = await res.json();
  currentSessionId = data.session_id;
  document.getElementById('session-badge').textContent = '#' + currentSessionId;
  document.getElementById('session-stats').textContent = '랙 0개 · 제품 0개';
  document.getElementById('session-bar').classList.add('show');
}

// ── 모드 2: 이어서 추가 ──
async function submitAppend() {
  startProgress(selectedFiles.length);
  setLoading(true);
  try {
    const form = new FormData();
    selectedFiles.forEach(f => form.append('files', f));
    const res = await fetch(`/api/scan/append/${currentSessionId}`, { method: 'POST', body: form });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    stopProgress();
    document.getElementById('session-stats').textContent = `랙 ${data.total_racks}개 · 제품 ${data.total_products}개`;
    showToast(`✅ RACK ${data.added_racks}개 추가 — 누적 ${data.total_racks}개 랙`, 'success');
    resetFiles();
  } catch(e) { stopProgress(); showToast('❌ ' + e.message, 'error'); }
  setLoading(false);
}

// ── 모드 2: 스캔 완료 ──
async function finishSession() {
  if (!currentSessionId) return;
  try {
    const res = await fetch(`/api/scan/finish/${currentSessionId}`, { method: 'POST' });
    const data = await res.json();
    showResult({ racks: data.total_racks, products: data.total_products, diff: data.diff, label: '이어서 스캔 완료' });
    currentSessionId = null;
    document.getElementById('session-bar').classList.remove('show');
    showToast('✅ 스캔 완료!', 'success');
  } catch(e) { showToast('❌ 완료 처리 실패', 'error'); }
}

// ── 모드 3: 랙별 ──
async function submitRack() {
  const rackNum = parseInt(document.getElementById('rack-number-input').value);
  if (!rackNum || rackNum < 1) { showToast('랙 번호를 입력하세요', 'error'); return; }
  startProgress(selectedFiles.length);
  setLoading(true);
  try {
    const form = new FormData();
    form.append('rack_number', rackNum);
    selectedFiles.forEach(f => form.append('files', f));
    const res = await fetch(`/api/scan/rack/${currentSessionId}`, { method: 'POST', body: form });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    stopProgress();
    document.getElementById('session-stats').textContent = `제품 ${data.total_products}개`;
    showToast(`✅ RACK ${rackNum} 교체 완료 — ${data.products_count}개 제품`, 'success');
    // 다음 랙 번호 자동 증가
    document.getElementById('rack-number-input').value = rackNum + 1;
    resetFiles();
  } catch(e) { stopProgress(); showToast('❌ ' + e.message, 'error'); }
  setLoading(false);
}

// ── 헬퍼 ──
let fakeTimer = null;
function startProgress(total) {
  document.getElementById('progress-section').style.display = 'block';
  document.getElementById('result-box').classList.remove('show');
  let fake = 0;
  fakeTimer = setInterval(() => {
    fake = Math.min(fake + Math.random() * 6, 88);
    document.getElementById('progress-bar').style.width = fake + '%';
    document.getElementById('progress-text').textContent = `${Math.floor(fake/100*total)}/${total}장 분석 중...`;
  }, 600);
}
function stopProgress() {
  if (fakeTimer) clearInterval(fakeTimer);
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('progress-text').textContent = '✅ 완료!';
  setTimeout(() => { document.getElementById('progress-section').style.display = 'none'; }, 800);
}
function showResult({ racks, products, diff, label }) {
  const box = document.getElementById('result-box');
  let diffHtml = '';
  if (diff && diff.has_previous) {
    const s = diff.summary;
    diffHtml = `<div class="result-row"><span class="result-label">이전 스캔 비교</span>
      <div class="diff-pills">
        <span class="diff-pill pill-g">+${s.added} 신규</span>
        <span class="diff-pill pill-r">-${s.removed} 제거</span>
        <span class="diff-pill pill-y">~${s.changed} 변동</span>
      </div></div>`;
  }
  box.innerHTML = `
    <div class="result-row"><span class="result-label">${label}</span><span class="result-val" style="color:var(--green)">✅ 완료</span></div>
    <div class="result-row"><span class="result-label">랙 수</span><span class="result-val">${racks}개</span></div>
    <div class="result-row"><span class="result-label">제품 수</span><span class="result-val">${products}개</span></div>
    ${diffHtml}
    <div style="margin-top:12px"><a href="/dashboard" style="color:var(--accent);font-size:13px;text-decoration:none">📊 대시보드 확인하기 →</a></div>`;
  box.classList.add('show');
}
function resetFiles() {
  selectedFiles = [];
  document.getElementById('preview-section').style.display = 'none';
  document.getElementById('file-input').value = '';
  document.getElementById('upload-zone').classList.remove('has-files');
  document.getElementById('btn-analyze').classList.remove('show');
}
function setLoading(on) {
  document.getElementById('btn-analyze').disabled = on;
}
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
