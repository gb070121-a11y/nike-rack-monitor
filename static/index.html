<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RACK MONITOR</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="랙모니터">
  <meta name="theme-color" content="#708090">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--border:#2a2a2a;--accent:#ff4d00;--accent2:#ff8c42;--green:#39d353;--red:#f85149;--yellow:#e3b341;--text:#e8e8e8;--muted:#666;--font-display:'Bebas Neue',sans-serif;--font-body:'Noto Sans KR',sans-serif;--font-mono:'JetBrains Mono',monospace;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;padding-bottom:80px;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .logo{font-family:var(--font-display);font-size:24px;letter-spacing:4px;}.logo span{color:var(--accent);}
  .store-tabs{display:flex;gap:6px;}
  .store-tab{padding:6px 14px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font-body);font-size:13px;cursor:pointer;transition:all 0.2s;}
  .store-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
  .container{max-width:900px;margin:0 auto;padding:20px 16px;}

  .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
  .mode-card{background:var(--surface);border:2px solid var(--border);border-radius:10px;padding:16px 12px;text-align:center;cursor:pointer;transition:all 0.2s;}
  .mode-card.active{border-color:var(--accent);background:rgba(255,77,0,0.06);}
  .mode-icon{font-size:28px;margin-bottom:6px;}
  .mode-title{font-family:var(--font-display);font-size:15px;letter-spacing:2px;margin-bottom:3px;}
  .mode-card.active .mode-title{color:var(--accent);}
  .mode-desc{font-size:11px;color:var(--muted);line-height:1.5;}

  /* 업로드 존 - 크게 */
  .upload-zone{background:var(--surface);border:2px dashed var(--border);border-radius:12px;padding:52px 24px;text-align:center;cursor:pointer;position:relative;transition:all 0.3s;width:100%;}
  .upload-zone.drag-over{border-color:var(--accent);background:rgba(255,77,0,0.05);transform:scale(1.01);}
  .upload-zone.has-files{border-style:solid;border-color:var(--accent);}
  .upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .upload-icon{font-size:56px;margin-bottom:14px;display:block;}
  .upload-title{font-family:var(--font-display);font-size:26px;letter-spacing:3px;margin-bottom:10px;}
  .upload-sub{color:var(--muted);font-size:14px;line-height:1.8;}
  .upload-sub em{color:var(--accent);font-style:normal;font-weight:700;}

  /* 미리보기 */
  .preview-section{display:none;margin-top:16px;}
  .preview-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .preview-title{font-family:var(--font-display);font-size:16px;letter-spacing:2px;}
  .preview-count{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
  .rack-groups{display:flex;flex-direction:column;gap:8px;}
  .rack-group{border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .rack-group-header{background:var(--surface2);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
  .rack-group-label{font-family:var(--font-display);font-size:16px;letter-spacing:2px;color:var(--accent);}
  .rack-group-count{font-size:11px;color:var(--muted);font-family:var(--font-mono);}
  .btn-remove-rack{background:transparent;border:none;color:var(--red);font-size:13px;cursor:pointer;padding:2px 8px;}
  .rack-photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;padding:12px;}
  .photo-thumb{aspect-ratio:1;border-radius:6px;overflow:hidden;border:1px solid var(--border);position:relative;}
  .photo-thumb img{width:100%;height:100%;object-fit:cover;}
  .photo-thumb .remove-btn{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center;}
  .photo-thumb:hover .remove-btn{display:flex;}
  .rack-drop-zone{border:2px dashed var(--border);border-radius:8px;padding:14px;text-align:center;cursor:pointer;color:var(--muted);font-size:13px;transition:all 0.2s;position:relative;margin:0 12px 12px;}
  .rack-drop-zone:hover,.rack-drop-zone.drag-over{border-color:var(--accent);color:var(--accent);}
  .rack-drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .add-rack-btn{width:100%;padding:10px;background:transparent;border:1px dashed var(--border);border-radius:6px;color:var(--muted);font-family:var(--font-body);font-size:13px;cursor:pointer;transition:all 0.2s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:6px;}
  .add-rack-btn:hover{border-color:var(--accent);color:var(--accent);}
  .rack-summary{background:var(--surface2);border-radius:6px;padding:8px 14px;margin-top:8px;font-size:12px;color:var(--muted);font-family:var(--font-mono);}

  .btn-analyze{width:100%;margin-top:16px;padding:20px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:var(--font-display);font-size:24px;letter-spacing:4px;cursor:pointer;transition:all 0.2s;display:none;align-items:center;justify-content:center;gap:8px;}
  .btn-analyze:hover:not(:disabled){background:#ff6520;transform:translateY(-1px);}
  .btn-analyze:disabled{background:var(--muted);cursor:not-allowed;transform:none;}
  .btn-analyze.show{display:flex;}

  .progress-section{display:none;margin-top:16px;}
  .progress-bar-wrap{background:var(--surface2);border-radius:4px;height:8px;overflow:hidden;margin:10px 0;}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width 0.4s;border-radius:4px;}
  .progress-text{font-family:var(--font-mono);font-size:13px;color:var(--muted);}

  .result-box{display:none;background:var(--surface);border:1px solid var(--green);border-radius:8px;padding:18px;margin-top:16px;}
  .result-box.show{display:block;}
  .result-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px;}
  .result-row:last-child{border-bottom:none;}
  .result-label{color:var(--muted);}
  .result-val{font-family:var(--font-mono);font-weight:700;}
  .diff-pills{display:flex;gap:6px;flex-wrap:wrap;}
  .diff-pill{font-size:11px;font-family:var(--font-mono);font-weight:700;padding:3px 10px;border-radius:20px;}
  .pill-g{background:rgba(57,211,83,0.15);color:var(--green);}
  .pill-r{background:rgba(248,81,73,0.15);color:var(--red);}
  .pill-y{background:rgba(227,179,65,0.15);color:var(--yellow);}

  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:500;padding-bottom:env(safe-area-inset-bottom);}
  .bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;text-decoration:none;color:var(--muted);font-size:11px;transition:color 0.2s;gap:3px;}
  .bottom-nav a.active{color:var(--accent);}
  .nav-icon{font-size:20px;}
  #toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 22px;font-size:14px;transition:transform 0.3s;z-index:400;white-space:nowrap;pointer-events:none;}
  #toast.show{transform:translateX(-50%) translateY(0);}
  #toast.error{border-color:var(--red);}
  #toast.success{border-color:var(--green);}
</style>
</head>
<body>
<header>
  <div class="logo">RACK<span>.</span>MONITOR</div>
  <div class="store-tabs">
    <button class="store-tab active" onclick="selectStore('gimhae',this)">김해</button>
    <button class="store-tab" onclick="selectStore('jeonggwan',this)">정관</button>
  </div>
</header>

<div class="container">
  <div class="mode-grid">
    <div class="mode-card active" onclick="selectMode('all',this)">
      <div class="mode-icon">📦</div>
      <div class="mode-title">한번에</div>
      <div class="mode-desc">전체 사진을<br>한 번에 업로드</div>
    </div>
    <div class="mode-card" onclick="selectMode('append',this)">
      <div class="mode-icon">➕</div>
      <div class="mode-title">이어서</div>
      <div class="mode-desc">나눠서 올려도<br>자동으로 이어짐</div>
    </div>
  </div>

  <div class="upload-zone" id="upload-zone">
    <input type="file" id="file-input" multiple accept="image/*" onchange="handleFiles(this.files)">
    <span class="upload-icon">📸</span>
    <div class="upload-title">사진 업로드</div>
    <div class="upload-sub">클릭하거나 <em>드래그앤드롭</em>으로 사진을 올리세요<br>여러 장 동시 선택 가능</div>
  </div>

  <div class="preview-section" id="preview-section">
    <div class="preview-header">
      <div class="preview-title">랙 구성</div>
      <span class="preview-count" id="preview-count">0장</span>
    </div>
    <div class="rack-groups" id="rack-groups"></div>
    <button class="add-rack-btn" onclick="addRackGroup()">＋ 랙 구분 추가</button>
    <div class="rack-summary" id="rack-summary"></div>
  </div>

  <button class="btn-analyze" id="btn-analyze" onclick="submitScan()">🔍 AI 분석 시작</button>

  <div class="progress-section" id="progress-section">
    <div class="progress-text" id="progress-text">분석 중...</div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  </div>

  <div class="result-box" id="result-box"></div>
</div>

<nav class="bottom-nav">
  <a href="/" class="active"><span class="nav-icon">📸</span><span>스캔</span></a>
  <a href="/floorplan"><span class="nav-icon">🗺️</span><span>랙별등록</span></a>
  <a href="/dashboard"><span class="nav-icon">📊</span><span>대시보드</span></a>
</nav>
<div id="toast"></div>

<script>
let selectedStore = 'gimhae';
let selectedMode = 'all';
let rackGroups = [];
let appendRackOffset = 0; // 이어서 모드에서 랙 번호 오프셋

function selectStore(store, el) {
  selectedStore = store;
  document.querySelectorAll('.store-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

function selectMode(mode, el) {
  selectedMode = mode;
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  resetFiles();
}

function handleFiles(files) {
  const newFiles = Array.from(files);
  if (!newFiles.length) return;
  const startNum = rackGroups.length === 0 ? (1 + appendRackOffset) : rackGroups[rackGroups.length-1].rackNum;
  if (rackGroups.length === 0) {
    rackGroups = [{ rackNum: startNum, files: newFiles }];
  } else {
    rackGroups[rackGroups.length-1].files.push(...newFiles);
  }
  document.getElementById('upload-zone').classList.add('has-files');
  renderPreview();
  document.getElementById('btn-analyze').classList.add('show');
  document.getElementById('file-input').value = '';
}

function setupDrop(el, onDrop) {
  el.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); el.classList.add('drag-over'); });
  el.addEventListener('dragleave', e => { if (!el.contains(e.relatedTarget)) el.classList.remove('drag-over'); });
  el.addEventListener('drop', e => { e.preventDefault(); e.stopPropagation(); el.classList.remove('drag-over'); onDrop(e.dataTransfer.files); });
}
setupDrop(document.getElementById('upload-zone'), handleFiles);

function addRackGroup() {
  if (!rackGroups.length) { showToast('먼저 사진을 선택하세요', 'error'); return; }
  if (!rackGroups[rackGroups.length-1].files.length) { showToast('현재 랙에 사진이 없습니다', 'error'); return; }
  const next = rackGroups[rackGroups.length-1].rackNum + 1;
  rackGroups.push({ rackNum: next, files: [] });
  renderPreview();
  showToast(`✅ RACK ${next} 추가됨`, 'success');
}

function removeRack(idx) {
  if (rackGroups.length <= 1) { showToast('마지막 랙은 삭제할 수 없습니다', 'error'); return; }
  rackGroups.splice(idx, 1);
  rackGroups.forEach((g,i) => g.rackNum = i + 1 + appendRackOffset);
  renderPreview();
}

function removePhoto(ri, pi) {
  rackGroups[ri].files.splice(pi, 1);
  if (!rackGroups[ri].files.length && rackGroups.length > 1) {
    rackGroups.splice(ri, 1);
    rackGroups.forEach((g,i) => g.rackNum = i + 1 + appendRackOffset);
  }
  if (!rackGroups.length || rackGroups.every(g=>!g.files.length)) { resetFiles(); return; }
  renderPreview();
}

function addToRack(ri, files) {
  rackGroups[ri].files.push(...Array.from(files));
  renderPreview();
}

function renderPreview() {
  const total = rackGroups.reduce((a,g)=>a+g.files.length, 0);
  document.getElementById('preview-section').style.display = 'block';
  document.getElementById('preview-count').textContent = `${total}장 / ${rackGroups.length}개 랙`;
  const groupsEl = document.getElementById('rack-groups');
  groupsEl.innerHTML = '';
  rackGroups.forEach((group, ri) => {
    const groupEl = document.createElement('div');
    groupEl.className = 'rack-group';
    const header = document.createElement('div');
    header.className = 'rack-group-header';
    header.innerHTML = `<span class="rack-group-label">RACK ${group.rackNum}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="rack-group-count">${group.files.length}장</span>
        ${rackGroups.length > 1 ? `<button class="btn-remove-rack" onclick="removeRack(${ri})">✕</button>` : ''}
      </div>`;
    groupEl.appendChild(header);
    const photosEl = document.createElement('div');
    photosEl.className = 'rack-photos';
    group.files.forEach((file, pi) => {
      const thumb = document.createElement('div');
      thumb.className = 'photo-thumb';
      const rb = document.createElement('button');
      rb.className = 'remove-btn'; rb.textContent = '✕';
      rb.onclick = e => { e.stopPropagation(); removePhoto(ri, pi); };
      thumb.appendChild(rb);
      const reader = new FileReader();
      reader.onload = e => { const img = document.createElement('img'); img.src = e.target.result; thumb.insertBefore(img, rb); };
      reader.readAsDataURL(file);
      photosEl.appendChild(thumb);
    });
    const dz = document.createElement('div');
    dz.className = 'rack-drop-zone';
    dz.innerHTML = `📎 이 랙에 사진 추가<input type="file" multiple accept="image/*" onchange="addToRack(${ri}, this.files)">`;
    setupDrop(dz, files => addToRack(ri, files));
    photosEl.appendChild(dz);
    groupEl.appendChild(photosEl);
    groupsEl.appendChild(groupEl);
  });
  document.getElementById('rack-summary').textContent = rackGroups.map(g=>`RACK${g.rackNum}:${g.files.length}장`).join(' | ');
}

async function submitScan() {
  const total = rackGroups.reduce((a,g)=>a+g.files.length, 0);
  if (!total) return;
  startProgress(total); setLoading(true);
  try {
    const form = new FormData();
    form.append('store', selectedStore);
    rackGroups.forEach(g => g.files.forEach(f => { form.append('files', f); form.append('rack_map', g.rackNum); }));
    const res = await fetch('/api/scan/bulk', { method:'POST', body:form });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    stopProgress();

    // 이어서 모드면 다음 업로드 랙 번호 이어서
    if (selectedMode === 'append') {
      appendRackOffset += rackGroups.length;
    }

    // 결과 표시
    const totalChanges = data.total_changes;
    let diffHtml = totalChanges > 0
      ? `<div class="result-row"><span class="result-label">변동 감지</span><span class="result-val" style="color:var(--yellow)">${totalChanges}건</span></div>`
      : '';
    showResult({ racks: data.rack_count, products: data.total_products, diffHtml, label: selectedMode==='append'?'이어서 스캔':'한번에 스캔' });
    resetFiles();
  } catch(e) { stopProgress(); showToast('❌ '+e.message, 'error'); }
  setLoading(false);
}

let fakeTimer = null;
function startProgress(total) {
  document.getElementById('progress-section').style.display = 'block';
  document.getElementById('result-box').classList.remove('show');
  let fake = 0;
  fakeTimer = setInterval(() => {
    fake = Math.min(fake+Math.random()*6, 88);
    document.getElementById('progress-bar').style.width = fake+'%';
    document.getElementById('progress-text').textContent = `${Math.floor(fake/100*total)}/${total}장 분석 중...`;
  }, 600);
}
function stopProgress() {
  if (fakeTimer) clearInterval(fakeTimer);
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('progress-text').textContent = '✅ 완료!';
  setTimeout(() => { document.getElementById('progress-section').style.display = 'none'; }, 800);
}
function showResult({racks, products, diffHtml, label}) {
  const box = document.getElementById('result-box');
  box.innerHTML = `
    <div class="result-row"><span class="result-label">${label} 완료</span><span class="result-val" style="color:var(--green)">✅</span></div>
    <div class="result-row"><span class="result-label">처리 랙</span><span class="result-val">${racks}개</span></div>
    <div class="result-row"><span class="result-label">제품 수</span><span class="result-val">${products}개</span></div>
    ${diffHtml}
    <div style="margin-top:14px">
      <a href="/dashboard" style="display:block;text-align:center;padding:12px;background:rgba(255,77,0,0.1);border:1px solid var(--accent);border-radius:6px;color:var(--accent);text-decoration:none;font-size:14px">📊 대시보드 확인하기 →</a>
    </div>`;
  box.classList.add('show');
}
function resetFiles() {
  rackGroups = [];
  document.getElementById('preview-section').style.display = 'none';
  document.getElementById('file-input').value = '';
  document.getElementById('upload-zone').classList.remove('has-files');
  document.getElementById('btn-analyze').classList.remove('show');
}
function setLoading(on) { document.getElementById('btn-analyze').disabled = on; }
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = type; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
</body>
</html>
