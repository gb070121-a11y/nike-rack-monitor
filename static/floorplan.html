<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RACK MONITOR — 랙별등록</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--border:#2a2a2a;--accent:#ff4d00;--green:#39d353;--red:#f85149;--yellow:#e3b341;--blue:#58a6ff;--text:#e8e8e8;--muted:#555;--font-display:'Bebas Neue',sans-serif;--font-body:'Noto Sans KR',sans-serif;--font-mono:'JetBrains Mono',monospace;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;padding-bottom:80px;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .logo{font-family:var(--font-display);font-size:24px;letter-spacing:4px;}.logo span{color:var(--accent);}
  .store-tabs{display:flex;gap:6px;}
  .store-tab{padding:6px 14px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font-body);font-size:13px;cursor:pointer;transition:all 0.2s;}
  .store-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
  .container{max-width:700px;margin:0 auto;padding:16px;}

  /* 세션 바 */
  .session-bar{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .session-badge{background:var(--accent);color:#fff;padding:3px 10px;border-radius:3px;font-size:11px;font-weight:700;font-family:var(--font-mono);}
  .btn-finish{background:var(--green);border:none;color:#000;padding:10px 18px;border-radius:6px;font-family:var(--font-display);font-size:16px;letter-spacing:2px;cursor:pointer;}

  .progress-wrap{margin-bottom:14px;}
  .progress-label{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:5px;display:flex;justify-content:space-between;}
  .progress-bar-bg{background:var(--surface2);border-radius:4px;height:6px;overflow:hidden;}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));transition:width 0.4s;border-radius:4px;width:0%;}

  /* 업로드 패널 */
  .upload-panel{background:var(--surface);border:2px solid var(--accent);border-radius:12px;padding:18px;margin-bottom:14px;display:none;}
  .upload-panel.show{display:block;}
  .upload-panel-title{font-family:var(--font-display);font-size:20px;letter-spacing:2px;color:var(--accent);margin-bottom:4px;}
  .upload-panel-sub{font-size:12px;color:var(--muted);margin-bottom:14px;}
  .upload-zone{border:2px dashed var(--border);border-radius:8px;padding:28px 20px;text-align:center;cursor:pointer;position:relative;transition:all 0.2s;}
  .upload-zone.drag-over{border-color:var(--accent);background:rgba(255,77,0,0.05);}
  .upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .upload-zone-icon{font-size:32px;margin-bottom:6px;}
  .upload-zone-text{color:var(--muted);font-size:13px;line-height:1.6;}
  .upload-zone-text span{color:var(--accent);font-weight:700;}
  .preview-thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:6px;margin-top:10px;}
  .preview-thumb{aspect-ratio:1;border-radius:5px;overflow:hidden;border:1px solid var(--border);}
  .preview-thumb img{width:100%;height:100%;object-fit:cover;}
  .btn-confirm{width:100%;margin-top:12px;padding:15px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:var(--font-display);font-size:20px;letter-spacing:3px;cursor:pointer;transition:all 0.2s;}
  .btn-confirm:hover:not(:disabled){background:#ff6520;}
  .btn-confirm:disabled{background:var(--muted);cursor:not-allowed;}
  .btn-cancel{width:100%;margin-top:8px;padding:10px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:var(--font-body);font-size:13px;cursor:pointer;}

  .result-section{background:var(--surface);border:1px solid var(--green);border-radius:10px;padding:16px;margin-bottom:14px;display:none;}
  .result-section.show{display:block;}
  .result-title{font-family:var(--font-display);font-size:18px;letter-spacing:2px;color:var(--green);margin-bottom:10px;}
  .result-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .result-row:last-child{border-bottom:none;}
  .diff-pills{display:flex;gap:6px;}
  .diff-pill{font-size:11px;font-family:var(--font-mono);font-weight:700;padding:3px 8px;border-radius:20px;}
  .pill-g{background:rgba(57,211,83,0.15);color:var(--green);}
  .pill-r{background:rgba(248,81,73,0.15);color:var(--red);}
  .pill-y{background:rgba(227,179,65,0.15);color:var(--yellow);}

  /* 패널 탭 */
  .panel-tab{padding:7px 14px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font-body);font-size:13px;cursor:pointer;transition:all 0.2s;}
  .panel-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  /* 수동 입력 행 */
  .manual-row{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;position:relative;}
  .manual-row-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .manual-row-num{font-family:var(--font-mono);font-size:11px;color:var(--accent);}
  .manual-del{background:transparent;border:none;color:var(--red);font-size:14px;cursor:pointer;padding:2px 6px;}
  .manual-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .manual-field{display:flex;flex-direction:column;gap:3px;}
  .manual-label{font-size:10px;color:var(--muted);font-family:var(--font-mono);}
  .manual-input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:5px;font-family:var(--font-mono);font-size:13px;outline:none;width:100%;transition:border-color 0.2s;}
  .manual-input:focus{border-color:var(--accent);}
  .manual-input.sku-input{grid-column:1/-1;}

  /* ═══ 평면도 공통 ═══ */
  .floorplan-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;}
  .floorplan-title{font-family:var(--font-display);font-size:15px;letter-spacing:3px;color:var(--muted);margin-bottom:12px;text-align:center;}
  .floor-outer{display:flex;flex-direction:row;gap:6px;align-items:stretch;}
  .floor-left{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0;}
  .floor-right{display:flex;flex-shrink:0;width:42px;align-self:stretch;}

  /* 랙 공통 */
  .rack{cursor:pointer;border-radius:6px;border:2.5px solid var(--border);background:var(--surface2);color:var(--muted);font-family:var(--font-mono);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all 0.2s;user-select:none;text-align:center;line-height:1.3;}
  .rack:hover{filter:brightness(1.4);}
  .rack-idle{background:var(--surface2);border-color:var(--border);color:var(--muted);}
  .rack-selected{background:rgba(255,77,0,0.2)!important;border-color:var(--accent)!important;color:var(--accent)!important;}
  .rack-uploading{background:rgba(227,179,65,0.15)!important;border-color:var(--yellow)!important;color:var(--yellow)!important;animation:pulse 1s infinite;}
  .rack-done{background:rgba(57,211,83,0.15)!important;border-color:var(--green)!important;color:var(--green)!important;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}

  /* 가로 벽랙 */
  .horiz-rack{width:100%;height:42px;font-size:13px;font-weight:700;background:rgba(88,166,255,0.08)!important;border-color:rgba(88,166,255,0.65)!important;color:var(--blue)!important;letter-spacing:1px;}
  /* 양면랙 A/B */
  .double-unit{display:flex;flex-direction:column;width:100%;margin-bottom:3px;}
  .rack-a{height:30px;border-radius:6px 6px 0 0;border:2px solid #39d353;font-size:12px;color:var(--green)!important;letter-spacing:0.5px;background:rgba(57,211,83,0.15)!important;}
  .rack-b{height:30px;border-radius:0 0 6px 6px;border:2px solid #39d353;border-top:1px solid rgba(57,211,83,0.4)!important;font-size:12px;color:var(--green)!important;letter-spacing:0.5px;background:rgba(57,211,83,0.1)!important;}
  /* 섹션 라벨 */
  .section-label{font-size:9px;color:var(--muted);font-family:var(--font-mono);text-align:center;padding:1px 0;opacity:0.8;}
  /* 중간 단면랙 */
  .mid-rack-wrap{display:flex;justify-content:flex-start;}
  .mid-rack{height:36px;width:58%;background:rgba(227,179,65,0.15)!important;border-color:#e3b341!important;color:#e3b341!important;font-size:12px;font-weight:700;letter-spacing:1px;}
  /* 세로 뒷벽랙 - 작게 */
  .vert-rack{writing-mode:vertical-rl;text-orientation:mixed;width:42px;height:100%;min-height:200px;flex-shrink:0;border-radius:6px;font-size:13px;font-weight:700;letter-spacing:1px;background:rgba(88,166,255,0.08)!important;border-color:rgba(88,166,255,0.65)!important;color:#58a6ff!important;}

  /* 범례 */
  .legend{display:flex;gap:12px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
  .legend-dot{width:10px;height:10px;border-radius:3px;border:2px solid;}

  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:500;}
  .bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;text-decoration:none;color:var(--muted);font-size:11px;transition:color 0.2s;gap:3px;}
  .bottom-nav a.active{color:var(--accent);}
  .nav-icon{font-size:20px;}
  #toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 22px;font-size:14px;transition:transform 0.3s;z-index:400;white-space:nowrap;pointer-events:none;}
  #toast.show{transform:translateX(-50%) translateY(0);}
  #toast.error{border-color:var(--red);}
  #toast.success{border-color:var(--green);}
</style>
</head>
<body>
<header>
  <div class="logo">RACK<span>.</span>MONITOR</div>
  <div class="store-tabs">
    <button class="store-tab active" onclick="selectStore('gimhae',this)">김해</button>
    <button class="store-tab" onclick="selectStore('jeonggwan',this)">정관</button>
  </div>
</header>

<div class="container">

  <div class="session-bar">
    <div id="session-info-area">
      <div style="font-size:13px;color:var(--muted)">랙을 클릭하면 바로 등록할 수 있습니다</div>
    </div>
    <button class="btn-finish" onclick="finishScan()">✅ 스캔 완료</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progress-text">0 / <span id="total-racks">35</span> 랙 완료</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
  </div>

  <div class="upload-panel" id="upload-panel">
    <div class="upload-panel-title" id="panel-title">랙 선택</div>

    <!-- 탭 -->
    <div style="display:flex;gap:6px;margin-bottom:14px;">
      <button class="panel-tab active" id="tab-scan" onclick="switchPanelTab('scan')">📸 AI 스캔</button>
      <button class="panel-tab" id="tab-manual" onclick="switchPanelTab('manual')">✏️ 수동 입력</button>
      <button class="panel-tab" id="tab-copy" onclick="switchPanelTab('copy')" style="border-color:var(--blue);color:var(--blue)">📋 복사</button>
    </div>

    <!-- AI 스캔 탭 -->
    <div id="pane-scan">
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" multiple accept="image/*" onchange="handleFiles(this.files)">
        <div class="upload-zone-icon">📸</div>
        <div class="upload-zone-text">사진을 <span>드래그앤드롭</span>하거나<br>클릭해서 선택하세요</div>
      </div>
      <div class="preview-thumbs" id="preview-thumbs"></div>
      <button class="btn-confirm" id="btn-confirm" onclick="confirmUpload()" disabled>🔍 AI 분석 시작</button>
    </div>

    <!-- 수동 입력 탭 -->
    <div id="pane-manual" style="display:none">
      <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center;">
        <div style="font-size:12px;color:var(--muted)">입력 모드:</div>
        <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer">
          <input type="radio" name="manual-mode" value="append" checked style="accent-color:var(--accent)"> 추가
        </label>
        <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer">
          <input type="radio" name="manual-mode" value="replace" style="accent-color:var(--accent)"> 전체 교체
        </label>
      </div>

      <div id="manual-rows">
        <!-- 동적으로 생성 -->
      </div>

      <button onclick="addManualRow()" style="width:100%;padding:9px;margin-top:6px;background:transparent;border:1px dashed var(--border);border-radius:6px;color:var(--muted);font-family:var(--font-body);font-size:13px;cursor:pointer;transition:all 0.2s;"
        onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'"
        onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
        ＋ 품번 추가
      </button>
      <button onclick="confirmManual()" style="width:100%;margin-top:10px;padding:14px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:var(--font-display);font-size:18px;letter-spacing:3px;cursor:pointer;">💾 저장</button>
    </div>

    <!-- 복사 탭 -->
    <div id="pane-copy" style="display:none">
      <div style="background:var(--surface2);border-radius:6px;padding:10px;margin-bottom:12px;font-size:12px;color:var(--muted)">
        복사 출처: <span id="copy-source-label" style="color:var(--accent);font-weight:700"></span>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:5px">📌 복사할 매장:</div>
      <select id="copy-to-store-tab" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:6px;width:100%;font-family:var(--font-mono);font-size:13px;margin-bottom:10px;" onchange="updateCopyToRackList()">
        <option value="gimhae">김해</option>
        <option value="jeonggwan">정관</option>
      </select>
      <div style="font-size:12px;color:var(--muted);margin-bottom:5px">📌 복사할 랙:</div>
      <select id="copy-to-rack-tab" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:6px;width:100%;font-family:var(--font-mono);font-size:13px;margin-bottom:14px;"></select>
      <button onclick="confirmCopyRackTab()" style="width:100%;padding:14px;background:var(--blue);border:none;border-radius:8px;color:#fff;font-family:var(--font-display);font-size:18px;letter-spacing:3px;cursor:pointer;">📋 복사</button>
    </div>

    <button class="btn-cancel" onclick="cancelUpload()" style="margin-top:8px">취소</button>
  </div>

  <div class="result-section" id="result-section">
    <div class="result-title">✅ 분석 완료</div>
    <div id="result-content"></div>
  </div>

  <!-- 평면도 -->
  <div class="floorplan-wrap" id="floorplan-wrap">
    <div class="floorplan-title" id="floorplan-title">📐 김해 매장 평면도</div>
    <div class="floor-outer">
      <div class="floor-left" id="floor-left"></div>
      <div class="floor-right">
        <div class="rack vert-rack rack-idle" id="rack-뒷_벽랙" onclick="selectRack('뒷_벽랙')" style="width:42px;height:100%;min-height:200px;flex-shrink:0;">뒷_벽랙</div>
      </div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--surface2);border-color:var(--border)"></div>미스캔</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(255,77,0,0.2);border-color:var(--accent)"></div>선택중</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(57,211,83,0.15);border-color:var(--green)"></div>완료</div>
    </div>
  </div>

</div>

<nav class="bottom-nav">
  <a href="/"><span class="nav-icon">📸</span><span>스캔</span></a>
  <a href="/floorplan" class="active"><span class="nav-icon">🗺️</span><span>랙별등록</span></a>
  <a href="/dashboard"><span class="nav-icon">📊</span><span>대시보드</span></a>
</nav>
<div id="toast"></div>

<script>
let currentStore = 'gimhae';
let selectedRack = null;
let pendingFiles = [];
let doneRacks = new Set();

// ── 매장별 평면도 구성 ──
const STORE_CONFIG = {
  gimhae: {
    title: '📐 김해 매장 평면도',
    totalRacks: 35,
    sections: [
      { type: 'wall', name: '왼_벽랙' },
      { type: 'label', text: '━ 1~5 양면랙 ━' },
      { type: 'double', num: 1 }, { type: 'double', num: 2 }, { type: 'double', num: 3 },
      { type: 'double', num: 4 }, { type: 'double', num: 5 },
      { type: 'mid', name: '중간A_랙' },
      { type: 'label', text: '━ 6~10 양면랙 ━' },
      { type: 'double', num: 6 }, { type: 'double', num: 7 }, { type: 'double', num: 8 },
      { type: 'double', num: 9 }, { type: 'double', num: 10 },
      { type: 'mid', name: '중간B_랙' },
      { type: 'label', text: '━ 11~15 양면랙 ━' },
      { type: 'double', num: 11 }, { type: 'double', num: 12 }, { type: 'double', num: 13 },
      { type: 'double', num: 14 }, { type: 'double', num: 15 },
      { type: 'wall', name: '오른_벽랙' },
    ]
  },
  jeonggwan: {
    title: '📐 정관 매장 평면도',
    totalRacks: 31,
    sections: [
      { type: 'wall', name: '왼_벽랙' },
      { type: 'label', text: '━ 1~4 양면랙 ━' },
      { type: 'double', num: 1 }, { type: 'double', num: 2 },
      { type: 'double', num: 3 }, { type: 'double', num: 4 },
      { type: 'mid', name: '중간A_랙' },
      { type: 'label', text: '━ 5~8 양면랙 ━' },
      { type: 'double', num: 5 }, { type: 'double', num: 6 },
      { type: 'double', num: 7 }, { type: 'double', num: 8 },
      { type: 'mid', name: '중간B_랙' },
      { type: 'label', text: '━ 9~14 양면랙 ━' },
      { type: 'double', num: 9  }, { type: 'double', num: 10 },
      { type: 'double', num: 11 }, { type: 'double', num: 12 },
      { type: 'double', num: 13 }, { type: 'double', num: 14 },
      { type: 'wall', name: '오른_벽랙' },
    ]
  }
};

function buildFloorplan(store) {
  const config = STORE_CONFIG[store];
  const left = document.getElementById('floor-left');
  left.innerHTML = '';

  config.sections.forEach(s => {
    if (s.type === 'wall') {
      const el = document.createElement('div');
      el.className = 'rack horiz-rack rack-idle';
      el.id = 'rack-' + s.name;
      el.textContent = s.name;
      el.onclick = () => selectRack(s.name);
      left.appendChild(el);
    } else if (s.type === 'label') {
      const el = document.createElement('div');
      el.className = 'section-label';
      el.textContent = s.text;
      left.appendChild(el);
    } else if (s.type === 'double') {
      const nameA = `${s.num}_양면A`;
      const nameB = `${s.num}_양면B`;
      const unit = document.createElement('div');
      unit.className = 'double-unit';
      unit.innerHTML = `
        <div class="rack rack-a rack-idle" id="rack-${nameA}" onclick="selectRack('${nameA}')"><span style="color:#39d353">${s.num} 양면 &nbsp;</span><span style="color:#e3b341;font-size:14px;font-weight:900">A</span></div>
        <div class="rack rack-b rack-idle" id="rack-${nameB}" onclick="selectRack('${nameB}')"><span style="color:#39d353">${s.num} 양면 &nbsp;</span><span style="color:#f85149;font-size:14px;font-weight:900">B</span></div>`;
      left.appendChild(unit);
    } else if (s.type === 'mid') {
      const wrap = document.createElement('div');
      wrap.className = 'mid-rack-wrap';
      wrap.innerHTML = `<div class="rack mid-rack rack-idle" id="rack-${s.name}" onclick="selectRack('${s.name}')">${s.name}</div>`;
      left.appendChild(wrap);
    }
  });

  // 뒷벽랙 상태 리셋
  setRackState('뒷_벽랙', 'idle');

  document.getElementById('floorplan-title').textContent = config.title;
  document.getElementById('total-racks').textContent = config.totalRacks;
  updateProgress();
}

function selectStore(store, el) {
  currentStore = store;
  document.querySelectorAll('.store-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  doneRacks.clear();
  cancelUpload();
  buildFloorplan(store);
  document.getElementById('result-section').classList.remove('show');
  document.getElementById('session-info-area').innerHTML = '<div style="font-size:13px;color:var(--muted)">랙을 클릭하면 바로 등록할 수 있습니다</div>';
}

function setRackState(rackName, state) {
  const el = document.getElementById('rack-' + rackName);
  if (!el) return;
  el.classList.remove('rack-idle','rack-selected','rack-uploading','rack-done');
  el.classList.add('rack-' + state);
}

async function selectRack(rackName) {
  if (selectedRack) setRackState(selectedRack, doneRacks.has(selectedRack) ? 'done' : 'idle');
  selectedRack = rackName;
  setRackState(rackName, 'selected');

  document.getElementById('panel-title').textContent = '📍 ' + rackName;
  document.getElementById('upload-panel').classList.add('show');
  document.getElementById('preview-thumbs').innerHTML = '';
  document.getElementById('file-input').value = '';
  document.getElementById('btn-confirm').disabled = true;
  document.getElementById('btn-confirm').textContent = '🔍 AI 분석 시작';
  document.getElementById('manual-rows').innerHTML = '';
  manualRowCount = 0;
  // 탭 초기화 - scan 탭으로
  ['scan','manual','copy'].forEach(t => {
    document.getElementById('pane-'+t).style.display = t==='scan' ? 'block' : 'none';
    document.getElementById('tab-'+t).classList.toggle('active', t==='scan');
  });
  resetUploadZone();
  pendingFiles = [];
  document.getElementById('upload-panel').scrollIntoView({ behavior:'smooth', block:'start' });
}

function resetUploadZone() {
  document.getElementById('upload-zone').querySelector('.upload-zone-icon').textContent = '📸';
  document.getElementById('upload-zone').querySelector('.upload-zone-text').innerHTML =
    '사진을 <span>드래그앤드롭</span>하거나<br>클릭해서 선택하세요';
}

function handleFiles(files) {
  pendingFiles = [...pendingFiles, ...Array.from(files)];
  const thumbs = document.getElementById('preview-thumbs');
  thumbs.innerHTML = '';
  pendingFiles.forEach(file => {
    const div = document.createElement('div');
    div.className = 'preview-thumb';
    const reader = new FileReader();
    reader.onload = e => { div.innerHTML = `<img src="${e.target.result}">`; };
    reader.readAsDataURL(file);
    thumbs.appendChild(div);
  });
  document.getElementById('upload-zone').querySelector('.upload-zone-text').innerHTML =
    `📎 <span>${pendingFiles.length}장 선택됨</span> — 더 추가하려면 클릭`;
  document.getElementById('btn-confirm').disabled = false;
  document.getElementById('file-input').value = '';
}

const uploadZone = document.getElementById('upload-zone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', e => { if (!uploadZone.contains(e.relatedTarget)) uploadZone.classList.remove('drag-over'); });
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });

async function confirmUpload() {
  if (!pendingFiles.length || !selectedRack) return;
  const btn = document.getElementById('btn-confirm');
  btn.disabled = true; btn.textContent = '⏳ 분석 중...';
  setRackState(selectedRack, 'uploading');
  try {
    const form = new FormData();
    form.append('store', currentStore);
    form.append('rack_name', selectedRack);
    pendingFiles.forEach(f => form.append('files', f));
    const res = await fetch('/api/scan/rack', { method:'POST', body:form });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();

    doneRacks.add(selectedRack);
    setRackState(selectedRack, 'done');
    updateProgress();

    // 결과 표시
    const ch = data.changes || {};
    const s = ch.summary || {};
    let diffHtml = '';
    if (ch.has_changes) {
      diffHtml = `<div class="result-row"><span style="color:var(--muted)">변동 내역</span>
        <div class="diff-pills">
          ${s.added ? `<span class="diff-pill pill-g">+${s.added} 신규</span>` : ''}
          ${s.removed ? `<span class="diff-pill pill-r">-${s.removed} 제거</span>` : ''}
          ${s.changed ? `<span class="diff-pill pill-y">~${s.changed} 변동</span>` : ''}
        </div></div>`;
    }
    document.getElementById('result-content').innerHTML = `
      <div class="result-row"><span style="color:var(--muted)">랙</span><span style="font-family:var(--font-mono);font-weight:700;color:var(--accent)">${selectedRack}</span></div>
      <div class="result-row"><span style="color:var(--muted)">제품 수</span><span style="font-family:var(--font-mono);font-weight:700">${data.products_count}개</span></div>
      ${diffHtml}`;
    document.getElementById('result-section').classList.add('show');

    cancelUpload();
    showToast(`✅ ${selectedRack} — ${data.products_count}개 완료`, 'success');
  } catch(e) {
    setRackState(selectedRack, 'selected');
    showToast('❌ ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '🔍 AI 분석 시작';
  }
}

function cancelUpload() {
  if (selectedRack && !doneRacks.has(selectedRack)) setRackState(selectedRack, 'idle');
  selectedRack = null; pendingFiles = [];
  document.getElementById('upload-panel').classList.remove('show');
  document.getElementById('preview-thumbs').innerHTML = '';
  document.getElementById('file-input').value = '';
  document.getElementById('btn-confirm').disabled = true;
  document.getElementById('btn-confirm').textContent = '🔍 AI 분석 시작';
  // 수동 입력 초기화
  document.getElementById('manual-rows').innerHTML = '';
  manualRowCount = 0;
  resetUploadZone();
}

function updateProgress() {
  const total = parseInt(document.getElementById('total-racks').textContent);
  const done = doneRacks.size;
  const pct = Math.round(done / total * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').innerHTML = `${done} / <span id="total-racks">${total}</span> 랙 완료`;
  document.getElementById('progress-pct').textContent = pct + '%';
}

function finishScan() {
  if (!doneRacks.size) { showToast('등록된 랙이 없습니다', 'error'); return; }
  const total = doneRacks.size;
  showToast(`✅ ${total}개 랙 스캔 완료 — 대시보드에서 확인하세요`, 'success');
  setTimeout(() => { window.location.href = '/dashboard'; }, 1500);
}

// ── 패널 탭 전환 ──
function switchPanelTab(tab) {
  ['scan','manual','copy'].forEach(t => {
    document.getElementById('pane-'+t).style.display = t===tab ? 'block' : 'none';
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  if (tab === 'copy') {
    const storeLabel = currentStore === 'gimhae' ? '김해' : '정관';
    document.getElementById('copy-source-label').textContent = storeLabel + ' / ' + (selectedRack || '');
    // 반대 매장을 먼저 표시
    const opposite = currentStore === 'gimhae' ? 'jeonggwan' : 'gimhae';
    const oppLabel = opposite === 'gimhae' ? '김해' : '정관';
    const curLabel = currentStore === 'gimhae' ? '김해' : '정관';
    const sel = document.getElementById('copy-to-store-tab');
    sel.innerHTML = `<option value="${opposite}">${oppLabel}</option><option value="${currentStore}">${curLabel}</option>`;
    updateCopyToRackList();
  }
  if (tab === 'manual' && document.getElementById('manual-rows').children.length === 0) {
    addManualRow();
  }
}

// ── 수동 입력 ──
let manualRowCount = 0;

function addManualRow() {
  manualRowCount++;
  const n = manualRowCount;
  const div = document.createElement('div');
  div.className = 'manual-row';
  div.id = 'manual-row-'+n;
  div.innerHTML = `
    <div class="manual-row-header">
      <span class="manual-row-num">#${n}</span>
      <button class="manual-del" onclick="removeManualRow(${n})">✕</button>
    </div>
    <div class="manual-grid">
      <div class="manual-field" style="grid-column:1/-1">
        <span class="manual-label">품번 *</span>
        <input class="manual-input sku-input" id="m-sku-${n}" placeholder="FQ8325 300" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div class="manual-field">
        <span class="manual-label">정가 (원)</span>
        <input class="manual-input" id="m-price-${n}" type="number" placeholder="89000" oninput="autoCalcManual(${n})">
      </div>
      <div class="manual-field">
        <span class="manual-label">할인율 (%)</span>
        <input class="manual-input" id="m-disc-${n}" type="number" placeholder="30" min="0" max="100" oninput="autoCalcManual(${n})">
      </div>
      <div class="manual-field" style="grid-column:1/-1">
        <span class="manual-label">할인가 (원) — 자동계산 또는 직접입력</span>
        <input class="manual-input" id="m-sale-${n}" type="number" placeholder="62300" oninput="autoCalcDiscRate(${n})">
      </div>
    </div>`;
  document.getElementById('manual-rows').appendChild(div);
  document.getElementById('m-sku-'+n).focus();
}

function removeManualRow(n) {
  const el = document.getElementById('manual-row-'+n);
  if (el) el.remove();
}

function autoCalcManual(n) {
  const price = parseInt(document.getElementById('m-price-'+n).value);
  const disc = parseInt(document.getElementById('m-disc-'+n).value);
  if (price && disc && disc > 0 && disc < 100) {
    document.getElementById('m-sale-'+n).value = Math.round(price * (1 - disc/100));
  }
}

function autoCalcDiscRate(n) {
  const price = parseInt(document.getElementById('m-price-'+n).value);
  const sale = parseInt(document.getElementById('m-sale-'+n).value);
  if (price && sale && sale < price) {
    document.getElementById('m-disc-'+n).value = Math.round((1 - sale/price)*100);
  }
}

function getManualProducts() {
  const rows = document.getElementById('manual-rows').querySelectorAll('.manual-row');
  const products = [];
  let hasError = false;
  rows.forEach(row => {
    const n = row.id.replace('manual-row-','');
    const sku = document.getElementById('m-sku-'+n)?.value?.trim();
    if (!sku) return;
    const price = document.getElementById('m-price-'+n)?.value;
    const disc = document.getElementById('m-disc-'+n)?.value;
    const sale = document.getElementById('m-sale-'+n)?.value;
    products.push({
      sku, name: '',
      price: price ? parseInt(price) : null,
      discount_rate: disc ? parseInt(disc) : null,
      sale_price: sale ? parseInt(sale) : null,
    });
  });
  return products;
}

async function confirmManual() {
  if (!selectedRack) return;
  const products = getManualProducts();
  if (!products.length) { showToast('품번을 하나 이상 입력하세요', 'error'); return; }

  const mode = document.querySelector('input[name="manual-mode"]:checked').value;
  setRackState(selectedRack, 'uploading');

  try {
    const form = new FormData();
    form.append('store', currentStore);
    form.append('rack_name', selectedRack);
    form.append('products_json', JSON.stringify(products));
    form.append('mode', mode);
    const res = await fetch('/api/manual/rack', { method:'POST', body:form });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();

    doneRacks.add(selectedRack);
    setRackState(selectedRack, 'done');
    updateProgress();

    const ch = data.changes || {};
    const s = ch.summary || {};
    let diffHtml = '';
    if (ch.has_changes) {
      diffHtml = `<div class="result-row"><span style="color:var(--muted)">변동 내역</span>
        <div class="diff-pills">
          ${s.added?`<span class="diff-pill pill-g">+${s.added} 신규</span>`:''}
          ${s.removed?`<span class="diff-pill pill-r">-${s.removed} 제거</span>`:''}
          ${s.changed?`<span class="diff-pill pill-y">~${s.changed} 변동</span>`:''}
        </div></div>`;
    }
    document.getElementById('result-content').innerHTML = `
      <div class="result-row"><span style="color:var(--muted)">랙</span><span style="font-family:var(--font-mono);color:var(--accent)">${selectedRack}</span></div>
      <div class="result-row"><span style="color:var(--muted)">저장된 품번</span><span style="font-family:var(--font-mono);font-weight:700">${data.products_saved}개</span></div>
      <div class="result-row"><span style="color:var(--muted)">입력 방식</span><span style="font-family:var(--font-mono)">수동 ${mode==='append'?'추가':'전체교체'}</span></div>
      ${diffHtml}`;
    document.getElementById('result-section').classList.add('show');
    cancelUpload();
    showToast(`✅ ${selectedRack} — ${data.products_saved}개 저장 완료`, 'success');
  } catch(e) {
    setRackState(selectedRack, 'selected');
    showToast('❌ '+e.message, 'error');
  }
}

// ── 복사 탭 ──
function updateCopyToRackList() {
  const sel = document.getElementById('copy-to-rack-tab');
  sel.innerHTML = ALL_RACK_NAMES.map(n =>
    `<option value="${n}" ${n===selectedRack?'selected':''}>${n}</option>`
  ).join('');
}

async function confirmCopyRackTab() {
  const toStore = document.getElementById('copy-to-store-tab').value;
  const toRack = document.getElementById('copy-to-rack-tab').value;
  if (!selectedRack) return;

  const fromStoreLabel = currentStore === 'gimhae' ? '김해' : '정관';
  const toStoreLabel = toStore === 'gimhae' ? '김해' : '정관';

  try {
    const form = new FormData();
    form.append('from_store', currentStore);
    form.append('from_rack', selectedRack);
    form.append('to_store', toStore);
    form.append('to_rack', toRack);
    const res = await fetch('/api/copy/rack', { method:'POST', body:form });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();

    document.getElementById('result-content').innerHTML = `
      <div class="result-row"><span style="color:var(--muted)">복사 출처</span><span style="font-family:var(--font-mono)">${fromStoreLabel} / ${selectedRack}</span></div>
      <div class="result-row"><span style="color:var(--muted)">복사 대상</span><span style="font-family:var(--font-mono);color:var(--accent)">${toStoreLabel} / ${toRack}</span></div>
      <div class="result-row"><span style="color:var(--muted)">제품 수</span><span style="font-family:var(--font-mono);font-weight:700">${data.products_count}개</span></div>`;
    document.getElementById('result-section').classList.add('show');
    cancelUpload();
    showToast(`✅ ${fromStoreLabel}/${selectedRack} → ${toStoreLabel}/${toRack} 복사 완료`, 'success');
  } catch(e) {
    showToast('❌ '+e.message, 'error');
  }
}

// 랙 목록
const ALL_RACK_NAMES = [
  '왼_벽랙','뒷_벽랙','오른_벽랙',
  '1_양면A','1_양면B','2_양면A','2_양면B','3_양면A','3_양면B',
  '4_양면A','4_양면B','5_양면A','5_양면B','중간A_랙',
  '6_양면A','6_양면B','7_양면A','7_양면B','8_양면A','8_양면B',
  '9_양면A','9_양면B','10_양면A','10_양면B','중간B_랙',
  '11_양면A','11_양면B','12_양면A','12_양면B','13_양면A','13_양면B',
  '14_양면A','14_양면B','15_양면A','15_양면B'
];







function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = type; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// 초기 빌드 - DOM 완전 로드 후 실행
document.addEventListener('DOMContentLoaded', () => buildFloorplan('gimhae'));
</script>
